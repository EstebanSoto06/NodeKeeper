/* Store en memoria para el módulo de Proveedores.
   El prototipo no tiene backend: este store mantiene los proveedores y la
   asignación equipo→proveedor en memoria, y notifica a los componentes
   suscritos (vía useSyncExternalStore). Al recargar la página se reinicia.

   Reglas reflejadas:
   - Cada equipo tiene como máximo un proveedor (supportProviderId) y es opcional.
   - Un proveedor puede estar asociado a varios equipos.
   - Al eliminar un proveedor, sus equipos pasan a `null` ("No asignado").
   Toda mutación sigue siendo mock (no persiste ni llama a una API). */

let state = {
  providers: DATA.providers.map((p) => ({ ...p })),
  // Asignación equipo→proveedor (clave: id de equipo, valor: id de proveedor | null)
  assign: Object.fromEntries(DATA.equipment.map((e) => [e.id, e.supportProviderId ?? null])),
  toast: null,
};

const listeners = new Set();
let toastTimer = null;

function emit() {
  state = { ...state };
  listeners.forEach((l) => l());
}
function subscribe(l) { listeners.add(l); return () => listeners.delete(l); }
function getSnapshot() { return state; }

function useStore() { return useSyncExternalStore(subscribe, getSnapshot); }

/* ---- Lecturas derivadas ---- */
function providerById(id) { return state.providers.find((p) => p.id === id) || null; }
function providerOfEquipment(eqId) { return providerById(state.assign[eqId]); }
function equipmentIdsForProvider(provId) {
  return Object.keys(state.assign).filter((eqId) => state.assign[eqId] === provId);
}
function equipmentCountForProvider(provId) { return equipmentIdsForProvider(provId).length; }

/* ---- Mutaciones (mock en memoria) ---- */
function nextProviderId() {
  const nums = state.providers.map((p) => parseInt(p.id.replace(/\D/g, ''), 10)).filter((n) => !isNaN(n));
  const n = (nums.length ? Math.max(...nums) : 0) + 1;
  return 'PROV-' + String(n).padStart(3, '0');
}

function addProvider(data) {
  const prov = { id: nextProviderId(), ...data };
  state.providers = [...state.providers, prov];
  emit();
  showToast('Proveedor creado correctamente.');
  return prov;
}

function updateProvider(id, data) {
  state.providers = state.providers.map((p) => (p.id === id ? { ...p, ...data } : p));
  emit();
  showToast('Proveedor actualizado correctamente.');
}

function removeProvider(id) {
  const affected = equipmentIdsForProvider(id);
  // Equipos asociados pasan a "No asignado" (null). No se eliminan equipos.
  const assign = { ...state.assign };
  affected.forEach((eqId) => { assign[eqId] = null; });
  state.assign = assign;
  state.providers = state.providers.filter((p) => p.id !== id);
  emit();
  showToast(affected.length
    ? 'Proveedor eliminado. Los equipos asociados quedaron sin proveedor asignado.'
    : 'Proveedor eliminado.');
}

function setEquipmentProvider(eqId, providerId) {
  state.assign = { ...state.assign, [eqId]: providerId || null };
  emit();
}

/* ---- Toast ---- */
function showToast(message, kind = 'success') {
  if (toastTimer) clearTimeout(toastTimer);
  state.toast = { message, kind, id: Date.now() };
  emit();
  toastTimer = setTimeout(() => { state.toast = null; emit(); }, 4200);
}
function dismissToast() {
  if (toastTimer) clearTimeout(toastTimer);
  state.toast = null;
  emit();
}

  return (
    <span className={`ic ${className}`} style={style}>
      <Cmp size={size} strokeWidth={stroke} />
    </span>
  );
}

  return (
    <svg height={height} width={height * (208 / 44)} viewBox="0 0 208 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NodeKeeper" style={{ display: 'block' }}>

      {dark && <rect x="0.5" y="0.5" width="43" height="43" rx="9.5" stroke="#FFFFFF" strokeOpacity="0.12" />}

/* Card (superficie blanca con borde hairline) y ProgressBar (avance del checklist). */

function Card({ children, className = '', style, pad = true }) {
  return <div className={`nk-card ${pad ? 'nk-card-pad' : ''} ${className}`} style={style}>{children}</div>;
}

function ProgressBar({ value, color }) {
  const c = color || (value >= 100 ? 'var(--green-600)' : value > 0 ? 'var(--amber-500)' : 'var(--gray-300)');
  return (
    <div className="nk-track"><div className="nk-fill" style={{ width: value + '%', background: c }}></div></div>
  );
}

/* Botones del Design System. Variantes: primary · secondary · ghost · danger · subtle. */

function Button({ children, variant = 'primary', size = 'md', icon, iconRight, onClick, type = 'button', disabled, style }) {
  return (
    <button type={type} className={`nk-btn nk-btn-${variant} nk-btn-${size}`} onClick={onClick} disabled={disabled} style={style}>
      {icon && <Icon name={icon} size={size === 'sm' ? 15 : 16} />}
      {children && <span>{children}</span>}
      {iconRight && <Icon name={iconRight} size={size === 'sm' ? 15 : 16} />}
    </button>
  );
}

function IconButton({ name, onClick, title, active, style }) {
  return (
    <button type="button" className={`nk-iconbtn ${active ? 'is-active' : ''}`} onClick={onClick} title={title} style={style}>
      <Icon name={name} size={17} />
    </button>
  );
}

/* Badges / pills no-estado: tipo de mantenimiento, prioridad, rol y un Badge genérico. */

function TypePill({ type }) {
  const map = {
    preventivo: { bg: 'var(--blue-50)', fg: 'var(--blue-700)', label: 'Preventivo' },
    correctivo: { bg: 'var(--gray-100)', fg: 'var(--gray-600)', label: 'Correctivo' },
  };
  const s = map[type] || map.preventivo;
  return <span className="nk-pill" style={{ background: s.bg, color: s.fg }}>{s.label}</span>;
}

function PriorityPill({ p }) {
  const map = {
    alta: { bg: 'var(--red-50)', fg: 'var(--red-700)' },
    media: { bg: 'var(--amber-50)', fg: 'var(--amber-700)' },
    baja: { bg: 'var(--gray-100)', fg: 'var(--gray-600)' },
  };
  const s = map[p] || map.media;
  return <span className="nk-pill" style={{ background: s.bg, color: s.fg, textTransform: 'capitalize' }}>{p}</span>;
}

function RolePill({ role }) {
  const admin = role === 'Administrador' || role === 'admin';
  return (
    <span className="nk-pill" style={{ background: admin ? 'var(--blue-50)' : 'var(--gray-100)', color: admin ? 'var(--blue-700)' : 'var(--gray-600)' }}>
      {role === 'admin' ? 'Administrador' : role === 'operator' ? 'Operador' : role}
    </span>
  );
}

// Badge genérico (texto + colores opcionales).
function Badge({ children, bg = 'var(--gray-100)', fg = 'var(--gray-600)', dot }) {
  return (
    <span className="nk-pill" style={{ background: bg, color: fg }}>
      {dot && <span className="nk-dot" style={{ background: dot }}></span>}
      {children}
    </span>
  );
}

/* Estado por color (semáforo). StatusPill acepta una clave de estado
   ('pendiente'|'progreso'|'cerrado') o un objeto {fg,bg,solid,label}. */

function StatusPill({ state, label, solid = false }) {
  const s = typeof state === 'object' ? state : NK.state[state];
  if (!s) return null;
  const text = label || s.label;
  if (solid) return <span className="nk-pill" style={{ background: s.solid, color: '#fff' }}>{text}</span>;
  return (
    <span className="nk-pill" style={{ background: s.bg, color: s.fg }}>
      <span className="nk-dot" style={{ background: s.solid }}></span>{text}
    </span>
  );
}

function HealthDot({ health, size = 9 }) {
  const s = NK.health[health];
  return <span className="nk-dot" style={{ background: s.solid, width: size, height: size }}></span>;
}

/* Tarjeta KPI / indicador con barra de acento de estado a la izquierda. */

function KpiCard({ label, value, accent, fg, delta, deltaColor }) {
  return (
    <Card className="nk-kpi" pad={false}>
      <span className="accent" style={{ background: accent }}></span>
      <div className="lab">{label}</div>
      <div className="num" style={{ color: fg }}>{value}</div>
      {delta && <div className="delta" style={{ color: deltaColor }}>{delta}</div>}
    </Card>
  );
}

/* Controles de formulario y filtros del Design System. */

function Field({ label, children, required, error }) {

function TextInput({ value, onChange, placeholder, type = 'text', error }) {

function SearchInput({ value, onChange, placeholder = 'Buscar…', style }) {

function Select({ value, onChange, options }) {

// Chips segmentados (filtros).

function Empty({ icon = 'inbox', title, sub }) {

/* Tabla del Design System. Uso:
     <Table columns={['Código','Nodo','Estado']}>
       <tr>…</tr>
     </Table>
   Para casos con celdas/encabezados personalizados, usa <table className="nk-table"> directamente. */

function Table({ columns = [], children }) {

      </thead>

/* Modal liquid glass reutilizable + Toast.
   Respeta el estilo del sistema: scrim navy translúcido, panel de vidrio con
   blur, bordes luminosos, sombras suaves y animación de entrada corta. */

function Modal({ title, subtitle, onClose, children, footer, size = 'md', icon }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  return (
    <div className="nk-modal-scrim" onClick={onClose}>
      <div className={`nk-modal nk-modal-${size}`} role="dialog" aria-modal="true" onClick={(e) => e.stopPropagation()}>
        <div className="nk-modal-head">
          <div style={{ display: 'flex', alignItems: 'center', gap: 11, minWidth: 0 }}>
            {icon && <span className="nk-modal-ico"><Icon name={icon} size={18} /></span>}
            <div style={{ minWidth: 0 }}>
              <h2 className="nk-modal-title">{title}</h2>
              {subtitle && <p className="nk-modal-sub">{subtitle}</p>}
            </div>
          </div>
          <button className="nk-iconbtn" onClick={onClose} title="Cerrar" aria-label="Cerrar"><Icon name="x" size={18} /></button>
        </div>
        <div className="nk-modal-body">{children}</div>
        {footer && <div className="nk-modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

/* Lista de definición para mostrar datos de un proveedor de forma legible. */
function DataList({ items }) {
  return (
    <dl className="nk-dl">
      {items.map((it) => (
        <div className="nk-dl-row" key={it.k}>
          <dt>{it.k}</dt>
          <dd className={it.mono ? 'nk-mono' : ''}>{it.v}</dd>
        </div>
      ))}
    </dl>
  );
}

function ToastHost() {
  const { toast } = useStore();
  if (!toast) return null;
  return (
    <div className="nk-toast" role="status" key={toast.id}>
      <Icon name={toast.kind === 'success' ? 'check-circle-2' : 'alert-circle'} size={17} />
      <span>{toast.message}</span>
      <button className="nk-iconbtn" onClick={dismissToast} title="Cerrar" style={{ width: 28, height: 28 }}><Icon name="x" size={15} /></button>
    </div>
  );
}

/* Modales compartidos del módulo Proveedores:
   - ProviderFormModal: crear / editar proveedor (con validaciones visuales).
   - DeleteProviderModal: confirmación de eliminación (indica equipos afectados).
   - ProviderInfoModal: "Información del proveedor" (solo lectura + acciones).
   Todas las acciones son mock (operan sobre el store en memoria). */

const EMPTY = { companyName: '', supportPhone: '', supportEmail: '', contactName: '', contactPhone: '', contactEmail: '' };
const PHONE_RE = /^[0-9()+\-\s]+$/;
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function validate(v) {
  const e = {};
  if (!v.companyName.trim()) e.companyName = 'Requerido.';
  if (!v.supportPhone.trim()) e.supportPhone = 'Requerido.';
  else if (!PHONE_RE.test(v.supportPhone)) e.supportPhone = 'Solo números y símbolos telefónicos.';
  if (!v.supportEmail.trim()) e.supportEmail = 'Requerido.';
  else if (!EMAIL_RE.test(v.supportEmail)) e.supportEmail = 'Correo no válido.';
  if (!v.contactName.trim()) e.contactName = 'Requerido.';
  if (!v.contactPhone.trim()) e.contactPhone = 'Requerido.';
  else if (!PHONE_RE.test(v.contactPhone)) e.contactPhone = 'Solo números y símbolos telefónicos.';
  if (!v.contactEmail.trim()) e.contactEmail = 'Requerido.';
  else if (!EMAIL_RE.test(v.contactEmail)) e.contactEmail = 'Correo no válido.';
  return e;
}

function ProviderFormModal({ provider, onClose }) {
  const editing = !!provider;
  const [v, setV] = useState(provider ? { ...provider } : { ...EMPTY });
  const [errors, setErrors] = useState({});
  const [touched, setTouched] = useState(false);
  const set = (k) => (val) => setV((s) => ({ ...s, [k]: val }));

  const submit = () => {
    const e = validate(v);
    setErrors(e); setTouched(true);
    if (Object.keys(e).length) return;
    if (editing) updateProvider(provider.id, v); else addProvider(v);
    onClose();
  };
  const err = (k) => (touched ? errors[k] : undefined);

  return (
    <Modal
      title={editing ? 'Editar proveedor' : 'Crear proveedor'}
      subtitle={editing ? provider.id : 'Registra un proveedor de soporte'}
      icon="building-2" size="md" onClose={onClose}
      footer={(
        <>
          <Button variant="ghost" onClick={onClose}>Cancelar</Button>
          <Button variant="primary" icon="check" onClick={submit}>Guardar proveedor</Button>
        </>
      )}
    >
      <div className="nk-form-grid">
        <div className="nk-col-2">
          <Field label="Nombre de empresa" required error={err('companyName')}>
            <TextInput value={v.companyName} onChange={set('companyName')} placeholder="Soporte Técnico del Norte" error={err('companyName')} />
          </Field>
        </div>
        <Field label="Número de soporte" required error={err('supportPhone')}>
          <TextInput value={v.supportPhone} onChange={set('supportPhone')} placeholder="800-555-0101" error={err('supportPhone')} />
        </Field>
        <Field label="Correo de soporte" required error={err('supportEmail')}>
          <TextInput value={v.supportEmail} onChange={set('supportEmail')} type="email" placeholder="soporte@empresa.example" error={err('supportEmail')} />
        </Field>
        <Field label="Persona de contacto" required error={err('contactName')}>
          <TextInput value={v.contactName} onChange={set('contactName')} placeholder="Carlos Rodríguez" error={err('contactName')} />
        </Field>
        <Field label="Número de contacto" required error={err('contactPhone')}>
          <TextInput value={v.contactPhone} onChange={set('contactPhone')} placeholder="8888-1111" error={err('contactPhone')} />
        </Field>
        <div className="nk-col-2">
          <Field label="Correo de contacto" required error={err('contactEmail')}>
            <TextInput value={v.contactEmail} onChange={set('contactEmail')} type="email" placeholder="carlos.rodriguez@empresa.example" error={err('contactEmail')} />
          </Field>
        </div>
      </div>
    </Modal>
  );
}

function DeleteProviderModal({ provider, onClose, onDeleted }) {
  const count = equipmentCountForProvider(provider.id);
  // onClose: solo cancelar/cerrar (no navega). onDeleted: tras confirmar borrado.
  const confirm = () => { removeProvider(provider.id); (onDeleted || onClose)(); };
  return (
    <Modal
      title="Eliminar proveedor" subtitle={provider.companyName} icon="trash-2" size="sm" onClose={onClose}
      footer={(
        <>
          <Button variant="ghost" onClick={onClose}>Cancelar</Button>
          <Button variant="danger" icon="trash-2" onClick={confirm}>Eliminar proveedor</Button>
        </>
      )}
    >
      {count > 0 ? (
        <p style={{ margin: 0, fontSize: 14, lineHeight: 1.6, color: 'var(--fg-1)' }}>
          Este proveedor está asociado con <b className="nk-mono">{count}</b> {count === 1 ? 'equipo' : 'equipos'}.
          Si lo eliminas, {count === 1 ? 'ese equipo pasará' : 'estos equipos pasarán'} a tener el proveedor de soporte como <b>“No asignado”</b>.
        </p>
      ) : (
        <p style={{ margin: 0, fontSize: 14, lineHeight: 1.6, color: 'var(--fg-1)' }}>¿Deseas eliminar este proveedor?</p>
      )}
    </Modal>
  );
}

function ProviderInfoModal({ provider, onClose, onGoToProvider, onEdit, role }) {
  const count = equipmentCountForProvider(provider.id);
  return (
    <Modal
      title="Información del proveedor" subtitle={provider.id} icon="building-2" size="md" onClose={onClose}
      footer={(
        <>
          <Button variant="ghost" onClick={onClose}>Cerrar</Button>
          {role === 'admin' && onEdit && <Button variant="secondary" icon="pencil" onClick={() => { onClose(); onEdit(provider); }}>Editar proveedor</Button>}
          {onGoToProvider && <Button variant="primary" icon="arrow-right" onClick={() => { onClose(); onGoToProvider(provider.id); }}>Ir al proveedor</Button>}
        </>
      )}
    >
      <DataList items={[
        { k: 'Empresa', v: provider.companyName },
        { k: 'Número de soporte', v: provider.supportPhone, mono: true },
        { k: 'Correo de soporte', v: provider.supportEmail },
        { k: 'Persona de contacto', v: provider.contactName },
        { k: 'Número de contacto', v: provider.contactPhone, mono: true },
        { k: 'Correo de contacto', v: provider.contactEmail },
        { k: 'Equipos asociados', v: count, mono: true },
      ]} />
    </Modal>
  );
}

/* Formulario de equipo (crear / editar) — modal liquid glass.
   Incluye el selector "Proveedor de soporte" (opcional): solo permite elegir
   entre proveedores ya registrados, con la opción "No asignado". No incluye
   creación rápida de proveedores ni campos de contacto del proveedor.
   La edición de equipo es mock: solo se persiste la asignación de proveedor
   (el resto del inventario es de solo demostración). */

function EquipmentFormModal({ equipment, onClose }) {
  const editing = !!equipment;
  useStore();
  const current = editing ? (providerOfEquipment(equipment.id)?.id || '') : '';
  const { providers } = useStore();

  const [name, setName] = useState(equipment?.name || '');
  const [type, setType] = useState(equipment?.type || 'Red');
  const [nodeId, setNodeId] = useState(equipment?.nodeId || DATA.nodes[0].id);
  const [providerId, setProviderId] = useState(current);

  const providerOptions = [
    { value: '', label: 'No asignado' },
    ...providers.map((p) => ({ value: p.id, label: p.companyName })),
  ];

  const submit = () => {
    if (editing) {
      setEquipmentProvider(equipment.id, providerId || null);
      showToast('Equipo actualizado correctamente.');
    } else {
      // Crear equipo es mock: en este prototipo no se agrega al inventario.
      showToast('Equipo registrado (demostración).');
    }
    onClose();
  };

  return (
    <Modal
      title={editing ? 'Editar equipo' : 'Registrar equipo'}
      subtitle={editing ? equipment.code : 'Nuevo equipo en un nodo'}
      icon="server" size="md" onClose={onClose}
      footer={(
        <>
          <Button variant="ghost" onClick={onClose}>Cancelar</Button>
          <Button variant="primary" icon="check" onClick={submit}>Guardar equipo</Button>
        </>
      )}
    >
      <div className="nk-form-grid">
        <div className="nk-col-2">
          <Field label="Nombre del equipo">
            <TextInput value={name} onChange={setName} placeholder="Switch core" />
          </Field>
        </div>
        <Field label="Tipo">
          <Select value={type} onChange={setType} options={['Red', 'Energía', 'Clima', 'Estructura'].map((t) => ({ value: t, label: t }))} />
        </Field>
        <Field label="Nodo">
          <Select value={nodeId} onChange={setNodeId} options={DATA.nodes.map((n) => ({ value: n.id, label: n.name }))} />
        </Field>
        <div className="nk-col-2">
          <Field label="Proveedor de soporte">
            <Select value={providerId} onChange={setProviderId} options={providerOptions} />
            <span style={{ fontSize: 11, color: 'var(--fg-3)', marginTop: 2 }}>Opcional. Solo proveedores ya registrados.</span>
          </Field>
        </div>
      </div>
    </Modal>
  );
}

        <div style={{ flex: 1, minWidth: 0 }}>

/* Barra superior: hamburguesa (responsive), buscador, acción rápida, rol y salir. */

function Topbar({ onMenu, role, onLogout }) {
  return (
    <header className="nk-topbar">

function TrendChart() {
  const data = DATA.trend;
  const max = Math.max(...data.map((d) => d.prev + d.corr));
  return (
    <Card pad>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <h3 className="nk-section-title">Mantenimientos cerrados · 8 semanas</h3>

        {data.map((d) => (
          <div className="nk-bar-col" key={d.w}>
            <div className="nk-bar-stack" style={{ height: '100%' }}>
              <div className="nk-bar" style={{ height: (d.corr / max * 100) + '%', background: 'var(--navy-600)' }} title={`Correctivo: ${d.corr}`}></div>
              <div className="nk-bar" style={{ height: (d.prev / max * 100) + '%', background: 'var(--blue-500)', borderRadius: '3px 3px 0 0' }} title={`Preventivo: ${d.prev}`}></div>

/* Listado de mantenimientos: búsqueda + filtros por tipo y estado. Diferencia

  const [q, setQ] = useState('');
  const [state, setState] = useState('all');
  const [type, setType] = useState('all');

  const rows = DATA.maint.filter((m) =>
    (state === 'all' || m.state === state) &&
    (type === 'all' || m.type === type) &&
    (q === '' || (m.node + m.code + m.resp).toLowerCase().includes(q.toLowerCase())));

  return (
    <div>
      <PageHeader eyebrow="Órdenes de trabajo" title="Mantenimientos"
        subtitle={`${DATA.maint.length} órdenes · ${DATA.maint.filter((m) => m.state === 'pendiente').length} pendientes`}
        actions={role === 'admin'
          ? <Button variant="primary" icon="plus">Nuevo mantenimiento</Button>
          : <Button variant="primary" icon="wrench">Crear correctivo</Button>} />

      <div style={{ display: 'flex', gap: 12, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>

        <FilterChips value={type} onChange={setType} options={[
          { value: 'all', label: 'Todo tipo' },
          { value: 'preventivo', label: 'Preventivo', dot: 'var(--blue-600)' },

          { value: 'pendiente', label: 'Pendiente', dot: 'var(--red-600)' },
          { value: 'progreso', label: 'En progreso', dot: 'var(--amber-500)' },
          { value: 'cerrado', label: 'Cerrado', dot: 'var(--green-600)' }]} />
      </div>

      <Card pad={false}>
        <table className="nk-table">
          <thead><tr><th>Código</th><th>Nodo</th><th>Tipo</th><th>Prioridad</th><th>Responsable</th><th>Fecha</th><th>Avance</th><th>Estado</th></tr></thead>

              <tr key={m.id} onClick={() => go('maint-detail', m.id)}>

      </Card>
    </div>
  );
}

/* Detalle de mantenimiento: checklist con avance %, regla de cierre al 100%,
   evidencias y línea de actividad. El botón "Cerrar mantenimiento" permanece
   bloqueado mientras el checklist no esté al 100% (mensaje de avance visible).
   El Operador puede iniciar, marcar tareas y adjuntar evidencia. */

function DetRow({ k, v, mono, link, onClick }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', gap: 12, alignItems: 'baseline' }}>
      <span style={{ fontSize: 12, color: 'var(--fg-3)', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600 }}>{k}</span>
      {link
        ? <a className="nk-link" onClick={onClick} style={{ fontWeight: 600 }}>{v}</a>
        : <span className={mono ? 'nk-mono' : ''} style={{ fontSize: 14, fontWeight: 500, textAlign: 'right' }}>{v}</span>}
    </div>
  );
}

function TLItem({ dot, title, time, by, last }) {
  return (
    <div className={`nk-tl-item ${last ? 'is-last' : ''}`}>
      <span className="nk-tl-dot" style={{ background: dot }}></span>
      <div>
        <div style={{ fontSize: 13, fontWeight: 600 }}>{title}</div>
        <div className="nk-mono" style={{ fontSize: 11, color: 'var(--fg-3)' }}>{time} · {by}</div>
      </div>
    </div>
  );
}

function MaintenanceDetail({ id, go }) {
  const base = DATA.maint.find((m) => m.id === id) || DATA.maint[0];
  const [tasks, setTasks] = useState(base.tasks.map((t) => ({ ...t })));
  const [closed, setClosed] = useState(base.state === 'cerrado');
  const [started, setStarted] = useState(base.state !== 'pendiente');

  const pct = NK.pct(tasks);
  const canClose = pct === 100 && !closed;
  const toggle = (i) => { setStarted(true); setTasks((ts) => ts.map((t, j) => (j === i ? { ...t, done: !t.done } : t))); };
  const evid = DATA.evidence;
  const liveState = closed ? 'cerrado' : (pct > 0 || started ? 'progreso' : 'pendiente');

  return (
    <div>
      <button className="nk-back" onClick={() => go('maintenances')}><Icon name="arrow-left" size={15} />Mantenimientos</button>
      <div className="nk-pagehead" style={{ alignItems: 'center' }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <h1 className="nk-page-title">{base.node}</h1>
            <span className="nk-mono" style={{ fontSize: 13, color: 'var(--fg-3)' }}>{base.code}</span>
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 8, flexWrap: 'wrap' }}>
            <TypePill type={base.type} /><StatusPill state={liveState} /><PriorityPill p={base.priority} />
            {base.recurring && <span className="nk-pill" style={{ background: 'var(--blue-50)', color: 'var(--blue-700)' }}><Icon name="repeat" size={12} />Recurrente</span>}
          </div>
        </div>
        <div className="nk-pagehead-actions">
          {liveState === 'pendiente' && <Button variant="primary" icon="check-circle-2" onClick={() => setStarted(true)}>Iniciar mantenimiento</Button>}
          <Button variant="secondary" icon="paperclip">Adjuntar evidencia</Button>
          <Button variant="danger" icon="check-circle-2" disabled={!canClose} onClick={() => setClosed(true)}>
            {closed ? 'Cerrado' : 'Cerrar mantenimiento'}
          </Button>
        </div>
      </div>

      {!closed && pct < 100 &&
        <div className="nk-callout"><Icon name="lock" size={15} /><span>No puedes cerrar: el checklist está al <b className="nk-mono">{pct}%</b>. Este mantenimiento solo puede cerrarse cuando esté al <b>100%</b>.</span></div>}
      {closed &&
        <div className="nk-callout is-ok"><Icon name="check-circle-2" size={15} /><span>Mantenimiento cerrado. Checklist completado al 100%.</span></div>}

      <div className="nk-grid" style={{ gridTemplateColumns: '1.5fr 1fr', marginTop: 16 }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {/* Checklist */}
          <Card pad={false}>
            <div className="nk-card-head">
              <h3 className="nk-section-title">Checklist</h3>
              <span className="nk-mono" style={{ fontSize: 13, fontWeight: 600, color: pct === 100 ? 'var(--green-700)' : 'var(--amber-700)' }}>{pct}%</span>
            </div>
            <div style={{ padding: '0 18px' }}><ProgressBar value={pct} /></div>
            <div className="nk-checklist">
              {tasks.map((t, i) => (
                <button key={i} className={`nk-task ${t.done ? 'is-done' : ''}`} onClick={() => !closed && toggle(i)} disabled={closed}>
                  <span className={`nk-check ${t.done ? 'is-done' : ''}`}>{t.done && <Icon name="check" size={12} />}</span>
                  <span className="nk-task-label">{t.label}</span>
                </button>
              ))}
            </div>
            <div className="nk-card-foot">
              <span className="nk-mono" style={{ fontSize: 12, color: 'var(--fg-3)' }}>{tasks.filter((t) => t.done).length}/{tasks.length} tareas</span>
              {!closed && <span style={{ fontSize: 12, color: 'var(--fg-3)' }}>Marca las tareas para actualizar el avance →</span>}
            </div>
          </Card>

          {/* Evidencias */}
          <Card pad={false}>
            <div className="nk-card-head"><h3 className="nk-section-title">Evidencias</h3><span className="nk-mono" style={{ fontSize: 12, color: 'var(--fg-3)' }}>{evid.length}</span></div>
            <div className="nk-evid-grid">
              <button className="nk-evid-drop"><Icon name="upload-cloud" size={20} /><span>Subir archivo</span><small>Imagen o PDF</small></button>
              {evid.map((v) => (
                <div key={v.id} className="nk-evid">
                  <div className="nk-evid-thumb" style={{ background: v.kind === 'image' ? 'var(--blue-50)' : 'var(--gray-100)' }}>
                    <Icon name={v.kind === 'image' ? 'image' : 'file-text'} size={22} style={{ color: v.kind === 'image' ? 'var(--blue-600)' : 'var(--gray-500)' }} />
                  </div>
                  <div className="nk-evid-meta">
                    <span className="nk-evid-name">{v.name}</span>
                    <span className="nk-evid-sub nk-mono">{v.size} · {v.by}</span>
                  </div>
                  <button className="nk-iconbtn" style={{ width: 28, height: 28 }}><Icon name="download" size={15} /></button>
                </div>
              ))}
            </div>
          </Card>
        </div>

        {/* Panel de detalle */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Card pad>
            <h3 className="nk-section-title" style={{ marginBottom: 14 }}>Detalle</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 13 }}>
              <DetRow k="Nodo" v={base.node} link onClick={() => go('node-detail', base.nodeId)} />
              <DetRow k="Tipo" v={base.type === 'preventivo' ? 'Preventivo' : 'Correctivo'} />
              {base.type === 'correctivo' && <DetRow k="Equipo" v={base.equip} mono />}
              <DetRow k="Responsable" v={base.resp} />
              <DetRow k="Programado" v={base.date} mono />
              <DetRow k="Ejecución" v={base.exec === 'terceros' ? 'Terceros' : 'Interno'} />
              <DetRow k="Recurrencia" v={base.recurring ? 'Mensual' : 'No aplica'} />
            </div>
          </Card>
          <Card pad>
            <h3 className="nk-section-title" style={{ marginBottom: 14 }}>Actividad</h3>
            <div className="nk-timeline">
              <TLItem dot="var(--blue-600)" title="Mantenimiento creado" time="2026-06-01 08:12" by="A. Vargas" />
              <TLItem dot="var(--amber-500)" title="En ejecución" time="2026-06-04 09:30" by={base.resp} />
              <TLItem dot="var(--green-600)" title="Evidencia adjuntada" time="2026-06-04 10:21" by={base.resp} last />
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

/* Calendario de mantenimientos (junio 2026). Eventos coloreados por estado,
   con filtros por tipo, estado y nodo. Click en un evento → mantenimientos. */

const DOW = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

function Calendar({ go }) {
  const [type, setType] = useState('all');
  const [state, setState] = useState('all');
  const events = DATA.calendar.filter((e) => (type === 'all' || e.type === type) && (state === 'all' || e.state === state));
  const byDay = {};
  events.forEach((e) => { (byDay[e.day] = byDay[e.day] || []).push(e); });
  const cells = [];
  for (let i = 0; i < 30; i++) cells.push(i + 1); // junio empieza lunes → sin huecos iniciales
  const today = 4;

  return (
    <div>
      <PageHeader eyebrow="Programación" title="Calendario de mantenimientos"
        subtitle="Junio 2026"
        actions={(
          <>
            <Button variant="secondary" icon="chevron-left" size="sm"></Button>
            <Button variant="secondary" size="sm">Hoy</Button>
            <Button variant="secondary" icon="chevron-right" size="sm"></Button>
            <Button variant="primary" icon="plus">Programar</Button>
          </>
        )} />

      <div style={{ display: 'flex', gap: 12, marginBottom: 14, flexWrap: 'wrap' }}>
        <FilterChips value={type} onChange={setType} options={[
          { value: 'all', label: 'Todo tipo' },
          { value: 'preventivo', label: 'Preventivo', dot: 'var(--blue-600)' },
          { value: 'correctivo', label: 'Correctivo', dot: 'var(--navy-600)' }]} />
        <FilterChips value={state} onChange={setState} options={[
          { value: 'all', label: 'Todo estado' },

/* NodeKeeper · Coopelesca — App raíz
   Enrutamiento visual por estado (sin librería de routing: prototipo) + sesión
   demo con rol. Tras login se entra al Dashboard. La navegación entre pantallas
   se hace con go(view, id). Sin backend.

   Flujos cubiertos:
     Login → Dashboard
     Dashboard → Detalle de mantenimiento
     Mantenimientos → Detalle de mantenimiento → Checklist/Evidencias
     Nodos → Detalle de nodo → Mapa
     Mapa → Detalle de nodo
     Calendario → Mantenimientos
     Reportes con filtros visuales
*/

function App() {
  const [authed, setAuthed] = useState(false);
  const [role, setRole] = useState('admin');
  const [view, setView] = useState('dashboard');
  const [selId, setSelId] = useState(null);

  const go = (v, id) => {
    setView(v);
    if (id !== undefined) setSelId(id);
    const c = document.querySelector('.nk-content');
    if (c) c.scrollTop = 0;
  };

  if (!authed) {
    return <Login onLogin={(r) => { setRole(r); setAuthed(true); setView('dashboard'); }} />;
  }

  let screen;
  switch (view) {
    case 'dashboard':    screen = <Dashboard go={go} role={role} />; break;
    case 'nodes':        screen = <Nodes go={go} />; break;
    case 'node-detail':  screen = <NodeDetail id={selId} go={go} role={role} />; break;
    case 'equipment':    screen = <Equipment go={go} role={role} />; break;
    case 'equipment-detail': screen = <EquipmentDetail id={selId} go={go} role={role} />; break;
    case 'providers':    screen = <Providers go={go} role={role} />; break;
    case 'provider-detail': screen = <ProviderDetail id={selId} go={go} role={role} />; break;
    case 'maintenances': screen = <Maintenances go={go} role={role} />; break;
    case 'maint-detail': screen = <MaintenanceDetail id={selId} go={go} role={role} />; break;
    case 'calendar':     screen = <Calendar go={go} />; break;
    case 'map':          screen = <MapPage go={go} />; break;
    case 'evidence':     screen = <Evidence />; break;
    case 'reports':      screen = <Reports />; break;
    case 'users':        screen = <UsersPage role={role} />; break;
    default:             screen = <Dashboard go={go} role={role} />;
  }

  return (
    <AppShell view={view} go={go} role={role} onLogout={() => setAuthed(false)}>
      {screen}
      <ToastHost />
    </AppShell>
  );
} function Harness(){ const [view,setView]=useState('login'); const [authed,setAuthed]=useState(false); const [role,setRole]=useState('admin'); const [selId,setSelId]=useState(null); const go=(v,id)=>{ setView(v); if(id!==undefined) setSelId(id); }; let screen; if(!authed){ screen=<Login onLogin={(r)=>{setAuthed(true); setRole(r); go('dashboard');}} />; } else { switch(view){ case 'dashboard': screen=<Dashboard go={go} role={role}/>; break; case 'nodes': screen=<Nodes go={go} role={role}/>; break; case 'node-detail': screen=<NodeDetail id={selId} go={go} role={role}/>; break; case 'equipment': screen=<Equipment go={go} role={role}/>; break; case 'equipment-detail': screen=<EquipmentDetail id={selId} go={go} role={role}/>; break; case 'providers': screen=<Providers go={go} role={role}/>; break; case 'provider-detail': screen=<ProviderDetail id={selId} go={go} role={role}/>; break; case 'maintenances': screen=<Maintenances go={go} role={role}/>; break; case 'maint-detail': screen=<MaintenanceDetail id={selId} go={go} role={role}/>; break; case 'calendar': screen=<Calendar go={go} role={role}/>; break; case 'map': screen=<MapPage go={go} role={role}/>; break; case 'evidence': screen=<Evidence go={go} role={role}/>; break; case 'reports': screen=<Reports go={go} role={role}/>; break; case 'users': screen=<UsersPage go={go} role={role}/>; break; default: screen=<Dashboard go={go} role={role}/>; }} return <AppShell view={view} go={go} role={role} onLogout={()=>setAuthed(false)}>{screen}<ToastHost/></AppShell>; } ReactDOM.createRoot(document.getElementById('root')).render(<Harness/>); setTimeout(()=>{ if(window.lucide&&lucide.createIcons) lucide.createIcons(); window.__ready=true; }, 500); } catch(e){ document.getElementById('root').innerHTML='<pre style="padding:20px;color:#b00;white-space:pre-wrap;font-size:11px">'+(e&&e.stack||e)+'</pre>'; }</script></body></html>
